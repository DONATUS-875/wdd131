<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <meta name="description" content="A Responsive Temple Picture Album showcasing beautiful temple images, a mobile-friendly navigation menu, and dynamic JavaScript functionality.">
    <meta name="author" content="Ahule Tertindi Doatus">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
    rel="stylesheet">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <button id="menu" aria-label="Open Navigation"></button>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Home</h2>
        <div class="gallery">
            <figure>
             <img src="images/temple-placeholder.jpg" alt="Aba Nigeria Temple" loading="lazy">
             <figcaption>Aba Nigeria Temple</figcaption>   
            </figure>

            <figure>
             <img src="images/temple-placeholder.jpg" alt="Accra Ghana Temple" loading="lazy">
             <figcaption>Accra Ghana Temple</figcaption>   
            </figure>
            

            <figure>
             <img src="images/temple-placeholder.jpg" alt="Rome Italy Temple" loading="lazy">
             <figcaption>Rome Italy Temple</figcaption>   
            </figure>
            

           <figure>
             <img src="images/temple-placeholder.jpg" alt="Salt Lake Temple" loading="lazy">
             <figcaption>Salt Lake Temple</figcaption>   
           </figure>
            

            <figure>
             <img src="images/temple-placeholder.jpg" alt="Washington D.C. Temple" loading="lazy">
             <figcaption>Washington D.C. Temple</figcaption>  
            </figure> 
        

           <figure>
             <img src="images/temple-placeholder.jpg" alt="Tokyo Japan Temple" loading="lazy">
             <figcaption>Tokyo Japan Temple</figcaption>   
           </figure>
            

           <figure>
             <img src="images/temple-placeholder.jpg" alt="Paris France Temple" loading="lazy">
             <figcaption>Paris France Temple</figcaption>   
           </figure>
            

            <figure>
             <img src="images/temple-placeholder.jpg" alt="Johannesburg South Africa Temple" loading="lazy">
             <figcaption>Johannesburg South Africa Temple</figcaption>   
            </figure>
            

            <figure>
             <img src="images/temple-placeholder.jpg" alt="Manila Philippines Temple" loading="lazy">
             <figcaption>Manila Philippines Temple</figcaption>   
            </figure>
            
        </div>
    </main>
    <footer>
        <p>
            &copy; <span id="currentyear"></span> Ahule Tertindi Donatus | Nigeria
        </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
