<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HTML Table Activity for WDD 131">
    <meta name="author" content="Ahule Tertindi Donatus">
    <title>Table Build Activity</title>
    <link rel="stylesheet" href="styles/table-build.css">
</head>
<body>
    <table>
        <thead>
            <tr>
                <th colspan="4">ACME Wildwest Services</th>
            </tr>
            <tr>
                <th class="blank"></th>
                <th>Basic</th>
                <th>Premium</th>
                <th>Deluxe</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Feature 1</th>
                <td><span class="check">&#10004;</span></td>
                <td><span class="check">&#10004;</span></td>
                <td><span class="check">&#10004;</span></td>
            </tr>
            <tr>
                <th>Feature 2</th>
                <td><span class="cross">&#10006;</span></td>
                <td><span class="check">&#10004;</span></td>
                <td><span class="check">&#10004;</span></td>
            </tr>
            <tr>
                <th>Feature 3</th>
                <td><span class="cross">&#10006;</span></td>
                <td><span class="cross">&#10006;</span></td>
                <td><span class="check">&#10004;</span></td>
            </tr>
        </tbody>
        <caption>Table 1: Account Feature Comparison</caption>
    </table>
</body>
</html>
